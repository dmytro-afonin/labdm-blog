name: CI

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint code
        run: bun run lint:code

      - name: Lint styles
        run: bun run lint:styles

      - name: Run type checks
        run: bun run typecheck

      - name: Build site
        run: bun run build

      - name: Run smoke validation
        run: bun run smoke

  vercel_config:
    name: Vercel Config
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}

    steps:
      - name: Check Vercel secrets
        id: check
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  deploy_preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    concurrency:
      group: vercel-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    needs:
      - quality
      - vercel_config
    if: github.event_name == 'pull_request' && needs.quality.result == 'success' && needs.vercel_config.outputs.configured == 'true'
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: bunx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: bunx vercel build --token="$VERCEL_TOKEN"

      - name: Create preview deployment record
        id: github_preview_deployment
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const ref = context.payload.pull_request.head.sha;
            const logUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref,
              auto_merge: false,
              required_contexts: [],
              environment: 'preview',
              production_environment: false,
              transient_environment: true,
              description: `Vercel preview for PR #${context.payload.pull_request.number}`,
            });
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              log_url: logUrl,
              description: 'Preview deployment in progress',
            });
            core.setOutput('deployment_id', `${deployment.data.id}`);

      - name: Deploy preview
        id: deploy
        run: |
          deployment_url="$(bunx vercel deploy --prebuilt --yes --token="$VERCEL_TOKEN")"
          if [[ ! "$deployment_url" =~ ^https:// ]]; then
            echo "::error::Expected a deployment URL from Vercel, got: $deployment_url"
            exit 1
          fi
          echo "Preview deployed to: $deployment_url"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Report preview deployment success to GitHub
        if: success()
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_ID: ${{ steps.github_preview_deployment.outputs.deployment_id }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        with:
          script: |
            const deploymentId = Number(process.env.DEPLOYMENT_ID);
            const deploymentUrl = process.env.DEPLOYMENT_URL;
            const { owner, repo } = context.repo;
            const logUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deploymentId,
              state: 'success',
              environment_url: deploymentUrl,
              log_url: logUrl,
              auto_inactive: true,
              description: 'Preview deployment ready',
            });

      - name: Report preview deployment failure to GitHub
        if: failure() && steps.github_preview_deployment.outputs.deployment_id != ''
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_ID: ${{ steps.github_preview_deployment.outputs.deployment_id }}
        with:
          script: |
            const deploymentId = Number(process.env.DEPLOYMENT_ID);
            const { owner, repo } = context.repo;
            const logUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deploymentId,
              state: 'failure',
              log_url: logUrl,
              description: 'Preview deployment failed',
            });

      - name: Summarize preview deployment
        run: |
          echo "### Preview Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview URL: ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Append preview URL to pull request body
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        with:
          script: |
            const startMarker = "<!-- vercel-preview-start -->";
            const endMarker = "<!-- vercel-preview-end -->";
            const section = [
              startMarker,
              "## Preview Deployment",
              "",
              `[Open preview](${process.env.DEPLOYMENT_URL})`,
              endMarker,
            ].join("\n");

            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });

            let body = pr.body || "";
            const startIdx = body.indexOf(startMarker);
            const endIdx = body.indexOf(endMarker);

            if (startIdx !== -1 && endIdx !== -1 && startIdx < endIdx) {
              body = body.substring(0, startIdx) + section + body.substring(endIdx + endMarker.length);
            } else {
              let cleaned = body;
              if (startIdx !== -1) cleaned = cleaned.replace(startMarker, "");
              if (endIdx !== -1) cleaned = cleaned.replace(endMarker, "");
              cleaned = cleaned.replace(/\n*## Preview Deployment\n+\[Open preview\]\([^)]*\)\n*/g, "\n");
              body = cleaned.trimEnd() + "\n\n" + section;
            }

            await github.rest.pulls.update({ owner, repo, pull_number, body });

  deploy_production:
    name: Vercel Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: vercel-production-main
      cancel-in-progress: false
    needs:
      - quality
      - vercel_config
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.quality.result == 'success' && needs.vercel_config.outputs.configured == 'true'
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Canonical prod host (keep in sync with src/config/site.ts)
      PRODUCTION_SITE_URL: https://blog.labdm.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: bunx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: bunx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Create production deployment record
        id: github_production_deployment
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const logUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: context.sha,
              auto_merge: false,
              required_contexts: [],
              environment: 'production',
              production_environment: true,
              transient_environment: false,
              description: 'Vercel production (CI after Quality)',
            });
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              log_url: logUrl,
              description: 'Production deployment in progress',
            });
            core.setOutput('deployment_id', `${deployment.data.id}`);

      - name: Deploy production
        run: bunx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Report production deployment success to GitHub
        if: success()
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_ID: ${{ steps.github_production_deployment.outputs.deployment_id }}
        with:
          script: |
            const deploymentId = Number(process.env.DEPLOYMENT_ID);
            const deploymentUrl = process.env.PRODUCTION_SITE_URL;
            const { owner, repo } = context.repo;
            const logUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deploymentId,
              state: 'success',
              environment_url: deploymentUrl,
              log_url: logUrl,
              auto_inactive: true,
              description: 'Production deployment ready',
            });

      - name: Report production deployment failure to GitHub
        if: failure() && steps.github_production_deployment.outputs.deployment_id != ''
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_ID: ${{ steps.github_production_deployment.outputs.deployment_id }}
        with:
          script: |
            const deploymentId = Number(process.env.DEPLOYMENT_ID);
            const { owner, repo } = context.repo;
            const logUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deploymentId,
              state: 'failure',
              log_url: logUrl,
              description: 'Production deployment failed',
            });
