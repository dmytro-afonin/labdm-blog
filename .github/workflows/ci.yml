name: CI

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: "1.3.10"

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint code
        run: bun run lint

      - name: Run type checks
        run: bun run typecheck

      - name: Build site
        run: bun run build

      - name: Run smoke validation
        run: bun run smoke

  vercel_config:
    name: Vercel Config
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}

    steps:
      - name: Check Vercel secrets
        id: check
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  deploy_preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    needs:
      - quality
      - vercel_config
    if: github.event_name == 'pull_request' && needs.quality.result == 'success' && needs.vercel_config.outputs.configured == 'true'
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: "1.3.10"

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: bunx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: bunx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy
        run: |
          deploy_log="$(mktemp)"
          bunx vercel deploy --prebuilt --yes --token="$VERCEL_TOKEN" 2>&1 | tee "$deploy_log"
          deployment_url="$(python3 - "$deploy_log" <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path(sys.argv[1]).read_text()
          matches = re.findall(r"https://[A-Za-z0-9.-]+\.vercel\.app", text)
          print(matches[-1] if matches else "")
          PY
          )"
          if [ -z "$deployment_url" ]; then
            echo "Failed to determine preview deployment URL from Vercel output." >&2
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Summarize preview deployment
        run: |
          echo "### Preview Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview URL: ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on pull request
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        with:
          script: |
            const marker = "<!-- vercel-preview-link -->";
            const body = [
              marker,
              "## Preview Deployment",
              "",
              `[Open preview](${process.env.DEPLOYMENT_URL})`,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => {
              return comment.user.type === "Bot" && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  deploy_production:
    name: Vercel Production
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-production-main
      cancel-in-progress: false
    needs:
      - quality
      - vercel_config
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.quality.result == 'success' && needs.vercel_config.outputs.configured == 'true'
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: "1.3.10"

      - name: Cache Bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: bunx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: bunx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: bunx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
