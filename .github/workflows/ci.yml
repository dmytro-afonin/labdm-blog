name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Astro checks
        run: bun run check

      - name: Build site
        run: bun run build

  vercel_config:
    name: Vercel Config
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}

    steps:
      - name: Check Vercel secrets
        id: check
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  deploy_preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    needs:
      - quality
      - vercel_config
    if: github.event_name == 'pull_request' && needs.vercel_config.outputs.configured == 'true'
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: bunx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: bunx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        run: bunx vercel deploy --prebuilt --token="$VERCEL_TOKEN"

  deploy_production:
    name: Vercel Production
    runs-on: ubuntu-latest
    needs:
      - quality
      - vercel_config
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.vercel_config.outputs.configured == 'true'
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: bunx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: bunx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: bunx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
